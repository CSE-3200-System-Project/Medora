global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files: []

scrape_configs:
  - job_name: "medora-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: backend

  - job_name: "medora-ai-ocr"
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-service:8001"]
        labels:
          service: ai_ocr

  - job_name: "medora-frontend-rum"
    metrics_path: /api/perf/vitals
    static_configs:
      - targets: ["frontend:3000"]
        labels:
          service: frontend

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres
