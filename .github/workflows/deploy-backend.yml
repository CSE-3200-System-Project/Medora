name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

env:
  RESOURCE_GROUP: medora-rg
  BACKEND_APP: medora-backend
  IMAGE_NAME: medora-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Install Azure Container Apps extension
        run: |
          az extension add --name containerapp

      - name: Build and push backend image
        id: build-image
        env:
          REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
          TAG_SHA: ${{ github.sha }}
        run: |
          IMAGE_SHA="$REGISTRY/$IMAGE_NAME:$TAG_SHA"
          IMAGE_LATEST="$REGISTRY/$IMAGE_NAME:latest"

          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" ./backend
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

          echo "image=$IMAGE_SHA" >> "$GITHUB_OUTPUT"

      - name: Deploy backend to Azure Container Apps
        run: |
          az containerapp update \
            --name "$BACKEND_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ steps.build-image.outputs.image }}"
