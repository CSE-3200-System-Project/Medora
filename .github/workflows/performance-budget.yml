name: Frontend Performance Budget

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/performance-budget.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/performance-budget.yml"

jobs:
  budget-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bundle Budget Gate
        run: npm run perf:bundle-budget

      - name: Lighthouse CI (Mobile)
        run: npm run perf:lhci:mobile

      - name: Lighthouse CI (Desktop)
        run: npm run perf:lhci:desktop
